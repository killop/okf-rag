[package]
name = "zvec"
version = "0.5.0"
edition = "2021"
license = "Apache-2.0"
repository = "https://github.com/zvec-ai/zvec-rust"
rust-version = "1.70"
description = "Safe Rust bindings for the zvec vector database"
readme = "README.md"
keywords = ["vector-database", "zvec", "similarity-search", "embeddings", "hnsw"]
categories = ["database", "api-bindings"]

[dependencies]
zvec-sys = { path = "../zvec-sys", version = "0.5.0" }
